services:
  backend:
    build: ./backend
    container_name: trollhunter-backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - db-data:/app/data
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  frontend:
    build: ./frontend
    container_name: trollhunter-frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    depends_on:
      - backend
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:alpine
    container_name: trollhunter-nginx
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  certbot:
    image: certbot/certbot
    container_name: trollhunter-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  db-data:
  certbot-etc:
  certbot-var:
  webroot:

networks:
  internal:
