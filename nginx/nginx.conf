# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=3r/m;

# Autoconfig for Thunderbird / mail clients
server {
    listen 80;
    server_name autoconfig.trollshunter.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /mail/config-v1.1.xml {
        alias /etc/nginx/mail/autoconfig.xml;
        default_type application/xml;
    }

    location / {
        return 301 https://trollshunter.com;
    }
}

# Autodiscover for Outlook
server {
    listen 80;
    server_name autodiscover.trollshunter.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /autodiscover/autodiscover.xml {
        alias /etc/nginx/mail/autodiscover.xml;
        default_type application/xml;
    }

    # Outlook also POSTs to this path
    location /Autodiscover/Autodiscover.xml {
        alias /etc/nginx/mail/autodiscover.xml;
        default_type application/xml;
    }

    location / {
        return 301 https://trollshunter.com;
    }
}

server {
    listen 80;
    server_name trollshunter.com www.trollshunter.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name trollshunter.com www.trollshunter.com;

    ssl_certificate /etc/letsencrypt/live/trollshunter.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trollshunter.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://pbs.twimg.com https://abs.twimg.com; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Hide server version
    server_tokens off;

    client_max_body_size 10M;

    # Mail autoconfig on main domain
    location /.well-known/autoconfig/mail/config-v1.1.xml {
        alias /etc/nginx/mail/autoconfig.xml;
        default_type application/xml;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — strict rate limit
    location /api/auth/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://backend:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API — moderate rate limit
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
